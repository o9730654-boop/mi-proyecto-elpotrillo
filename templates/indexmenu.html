<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Menú - Café / Restaurante</title>
<link rel="stylesheet" href="{{ url_for('static', filename='12341.css') }}" />
</head>
<body>
<div id="alerta-cocina">🔔 ¡Pedido de <span id="nombre-cliente-listo"></span> listo!</div>

<header class="site-header">
    <div class="container header-inner">
        <h1 class="logo">El Potrillo - Menú</h1>
        <nav class="main-nav" aria-label="Navegación principal">
            <a href="#Comida">Comida</a>
            <a href="#Bebida">Bebidas</a>
            <a href="#Licuados">Licuados</a>
            <a href="/reporte-ventas" class="nav-link"> Consulta de ventas</a>
            <a href="/reporte" class="nav-link"> Corte de Caja</a>
            <a href="/mesas" class="nav-link"> Mesas</a>
            <a href="/cocina" class="nav-link"> Pantalla de Cocina</a>
            <a href="/inventario" class="nav-link"> Inventario</a>
            <a href="#" onclick="logout()"> Cerrar Sesión</a>
        </nav>
    </div>
</header>

<main class="container layout">
    <section id="menu" class="menu-grid" aria-label="Lista de platillos"></section>

    <aside class="cart" aria-label="Carrito de orden">
    <h3>🛒 Mi Orden</h3>
    <ul id="cart-items"></ul>
    <div class="cart-total">
        <strong>Total:</strong> $<span id="cart-total">0.00</span>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <button type="button" class="btn" style="grid-column: span 2;" onclick="window.enviarACaja()">📝 Enviar a Caja (Cobrar luego)</button>
    </div>
    </aside>
</main>

<footer>
    <div class="container">
    <p>© <span id="year"></span> El Potrillo — Menú digital</p>
    </div>
</footer>

<script>

    // ─── CONTROL DE ACCESO POR ROL ───────────────────────────────────────────────
    (function() {
        const token = localStorage.getItem('authToken');
        const rol   = localStorage.getItem('userRol');
        if (!token || !rol) { window.location.href = '/'; return; }
        // cajero también puede entrar al menú para ver sus links
        const rolesPermitidos = ["mesero", "admin", "cajero"];
        if (!rolesPermitidos.includes(rol)) {
            const destinos = {
                'cocinero': '/cocina',
                'hoster':   '/mesas'
            };
            alert('No tienes permiso para acceder a esta sección.');
            window.location.href = destinos[rol] || '/';
        }
    })();
    // ─────────────────────────────────────────────────────────────────────────────


    // ─── FILTRO DE NAVBAR SEGÚN ROL ──────────────────────────────────────────────
    (function filtrarNavbar() {
        const rol = localStorage.getItem('userRol');

        // Qué links puede ver cada rol (null = ve todo)
        const navPermitido = {
            'mesero':   ['#Comida', '#Bebida', '#Licuados'],
            'cajero':   ['/reporte-ventas', '/reporte', '/inventario'],
            'cocinero': ['/cocina'],
            'hoster':   ['/mesas'],
            'admin':    null
        };

        const permitidos = navPermitido[rol];
        if (!permitidos) return; // admin ve todo

        document.querySelectorAll('.main-nav a').forEach(link => {
            const href    = link.getAttribute('href') || '';
            const onclick = link.getAttribute('onclick') || '';
            // Siempre mostrar cerrar sesión
            if (onclick.includes('logout')) return;
            // Mostrar solo si el href está en la lista permitida
            const visible = permitidos.some(p => href.includes(p));
            if (!visible) link.style.display = 'none';
        });

        // Si es cajero, ocultar el carrito y mostrar mensaje de bienvenida
        if (rol === 'cajero') {
            const layout = document.querySelector('.layout');
            if (layout) {
                layout.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:#64748b;">
                        <div style="font-size:3.5rem;margin-bottom:16px;">💼</div>
                        <h2 style="color:#1e293b;margin-bottom:10px;">Panel de Caja</h2>
                        <p style="font-size:1rem;">Usa el menú de navegación para acceder a:<br><br>
                            <strong>Consulta de Ventas</strong> · <strong>Corte de Caja</strong> · <strong>Inventario</strong>
                        </p>
                    </div>`;
            }
        }
    })();
    // ─────────────────────────────────────────────────────────────────────────────

    function logout() {
        localStorage.removeItem('authToken');
        alert('Sesión cerrada.');
        window.location.href = '/';
    }

    async function loadMenu() {
        try {
            const response = await fetch('/api/menu');
            const rawText = await response.text();
            if (!response.ok) throw new Error('Error HTTP ' + response.status + ': ' + rawText);
            const data = JSON.parse(rawText);
            if (data.length === 0) {
                document.getElementById('menu').innerHTML =
                    '<p style="color:red;padding:20px">⚠️ La API devolvió 0 productos.</p>';
                return [];
            }
            return data.map(item => {
                const name  = item.mnu_nombre_plato || item.Mnu_nombre_plato || '';
                const desc  = item.mnu_descripcion  || item.Mnu_descripcion  || '';
                const price = parseFloat(item.mnu_precio || item.Mnu_precio  || 0);
                return { name, desc, price, category: classifyCategory(name) };
            });
        } catch (error) {
            console.error('Error cargando menú:', error);
            document.getElementById('menu').innerHTML =
                '<p style="color:red;padding:20px">❌ Error: ' + error.message + '</p>';
            return [];
        }
    }

    function classifyCategory(name) {
        if (name.includes('Huevo') || name.includes('Tortas') || name.includes('Chilaquiles') || name.includes('Sándwiches')) return 'Comida';
        if (name.includes('Café') || name.includes('Chocomilk')) return 'Bebida caliente';
        if (name.includes('Licuado')) return 'Licuados';
        if (name.includes('Refresco') || name.includes('Jamaica') || name.includes('Limonada')) return 'Bebida';
        return 'Comida';
    }

    async function iniciarMenu() {
        const items = await loadMenu();
        const grouped = items.reduce((acc, item) => {
            if (!acc[item.category]) acc[item.category] = [];
            acc[item.category].push(item);
            return acc;
        }, {});

        const menuEl = document.getElementById('menu');
        const order = ['Comida', 'Bebida caliente', 'Licuados', 'Bebida'];
        menuEl.innerHTML = '';

        order.forEach(cat => {
            const list = grouped[cat];
            if (!list) return;
            const section = document.createElement('section');
            section.className = 'category-section';
            section.id = cat.replace(' ', '');
            const h = document.createElement('h3');
            h.className = 'category-title';
            h.textContent = cat;
            section.appendChild(h);
            const grid = document.createElement('div');
            grid.className = 'cards';
            list.forEach(item => {
                const card = document.createElement('article');
                card.className = 'card';
                const titleRow = document.createElement('div');
                titleRow.className = 'card-title-row';
                const title = document.createElement('h4');
                title.className = 'card-title';
                title.textContent = item.name;
                const price = document.createElement('div');
                price.className = 'card-price';
                price.textContent = '$' + item.price.toFixed(2);
                titleRow.appendChild(title);
                titleRow.appendChild(price);
                const desc = document.createElement('p');
                desc.className = 'card-desc';
                desc.textContent = item.desc;
                const actions = document.createElement('div');
                actions.className = 'card-actions';
                const addBtn = document.createElement('button');
                addBtn.className = 'btn';
                addBtn.textContent = 'Agregar';
                addBtn.onclick = () => addToCart(item);
                actions.appendChild(addBtn);
                card.appendChild(titleRow);
                card.appendChild(desc);
                card.appendChild(actions);
                grid.appendChild(card);
            });
            section.appendChild(grid);
            menuEl.appendChild(section);
        });
        document.getElementById('year').textContent = new Date().getFullYear();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', iniciarMenu);
    } else {
        iniciarMenu();
    }

    let cart = [];
    function addToCart(item) {
        const existing = cart.find(i => i.name === item.name);
        if (existing) { existing.qty++; } else { cart.push({ ...item, qty: 1 }); }
        renderCart();
    }
    function removeFromCart(name) {
        cart = cart.filter(i => i.name !== name);
        renderCart();
    }
    function renderCart() {
        const cartList  = document.getElementById('cart-items');
        const cartTotal = document.getElementById('cart-total');
        cartList.innerHTML = '';
        let total = 0;
        cart.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${item.qty} × ${item.name}</span><span>$${(item.price * item.qty).toFixed(2)}</span><button class="btn-remove">✖</button>`;
            li.querySelector('.btn-remove').onclick = () => removeFromCart(item.name);
            cartList.appendChild(li);
            total += item.price * item.qty;
        });
        cartTotal.textContent = total.toFixed(2);
    }

    window.enviarACaja = async function() {
        if (cart.length === 0) { alert("Tu carrito está vacío."); return; }
        const cliente = prompt("Nombre del cliente:", "Venta de Mostrador");
        if (cliente === null || cliente.trim() === "") return;
        const token = localStorage.getItem('authToken');
        if (!token) { alert("Error de sesión."); window.location.href = '/'; return; }
        try {
            const response = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ cliente, telefono: "", metodo_pago: 'Pendiente', items: cart })
            });
            if (response.ok) {
                alert(`✅ Orden de ${cliente} enviada a Cocina y Caja`);
                cart = []; renderCart();
            } else {
                const err = await response.json();
                alert('❌ Error: ' + (err.message || 'No se pudo guardar.'));
            }
        } catch (error) {
            alert('Error de conexión con el servidor.');
        }
    };

    let ticketsAvisados = new Set();
    let colaNotificaciones = [];
    let mostrando = false;

    async function revisarPedidosListos() {
        const token = localStorage.getItem('authToken');
        try {
            const response = await fetch('/api/notificaciones/listos', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const listos = await response.json();
            listos.forEach(pedido => {
                if (!ticketsAvisados.has(pedido.ticket_id)) {
                    ticketsAvisados.add(pedido.ticket_id);
                    // Agregar a la cola con el nombre correcto de ESE pedido
                    colaNotificaciones.push({
                        ticket: pedido.ticket_id,
                        cliente: pedido.cliente
                    });
                }
            });
            // Si no hay nada mostrándose, mostrar el siguiente de la cola
            if (!mostrando && colaNotificaciones.length > 0) {
                mostrarSiguiente();
            }
        } catch (e) { console.error("Error en notificaciones", e); }
    }

    function mostrarSiguiente() {
        if (colaNotificaciones.length === 0) { mostrando = false; return; }
        mostrando = true;
        const pedido = colaNotificaciones.shift(); // sacar el primero de la cola
        const alerta = document.getElementById('alerta-cocina');
        document.getElementById('nombre-cliente-listo').innerText = pedido.cliente;
        alerta.style.display = 'block';
        // Después de 4 segundos ocultar y mostrar el siguiente si hay más
        setTimeout(() => {
            alerta.style.display = 'none';
            setTimeout(mostrarSiguiente, 500); // pequeña pausa entre notificaciones
        }, 4000);
    }

    setInterval(revisarPedidosListos, 5000);

</script>
</body>
</html>
