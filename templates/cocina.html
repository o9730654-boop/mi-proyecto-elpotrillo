<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina - El Potrillo</title>
    <style>
        :root {
            --pendiente: #e67e22;
            --proceso: #3498db;
            --fondo: #f0f2f5;
            --oscuro: #2c3e50;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--fondo); margin: 0; padding: 20px; }
        
        /* Contenedor del encabezado para alinear botón y título */
        .header-container { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 2px solid #bdc3c7;   
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        h1 { margin: 0; color: var(--oscuro); flex-grow: 1; text-align: center; }

        /* Estilo del botón de volver */
        .btn-back {
            background-color: var(--oscuro);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-back:hover { background-color: #34495e; opacity: 0.9; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        /* Estilo de la Comanda */
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        
        .card-header { padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .card-header.Pendiente { background: var(--pendiente); }
        .card-header.EnProceso { background: var(--proceso); }
        
        .card-body { padding: 20px; min-height: 100px; }
        .item-row { display: flex; justify-content: space-between; font-size: 1.2em; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        
        .card-footer { padding: 15px; background: #fafafa; }
        
        .btn { width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1em; cursor: pointer; color: white; transition: 0.3s; }
        .btn-start { background: var(--proceso); }
        .btn-start:hover { background: #2980b9; }
        .btn-done { background: #27ae60; }
        .btn-done:hover { background: #219150; }

        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 18px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <button class="btn-back" onclick="window.location.href='/menu'">⬅ Volver al Menú</button>
        <h1>👨‍🍳 Panel de Control de Cocina</h1>
        <div style="width: 140px;"></div>
    </div>

    <div id="pedidos-container" class="grid">
        <div class="loading">Cargando pedidos...</div>
    </div>

    <script>
    // FUNCIÓN AUXILIAR PARA PETICIONES CON TOKEN (Se mantiene igual)
    async function fetchWithToken(url, options = {}) {
        const token = localStorage.getItem('token');
        if (!token) {
            alert('Error de sesión. Inicia sesión de nuevo.');
            window.location.href = '/';
            return null;
        }
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
            ...options.headers
        };
        const response = await fetch(url, { ...options, headers });
        if (response.status === 401) {
            alert('Sesión expirada.');
            localStorage.removeItem('token');
            window.location.href = '/';
            return null;
        }
        return response;
    }

    async function fetchPedidos() {
        try {
            const response = await fetchWithToken('/api/cocina/pedidos', { method: 'GET' });
            if (!response || !response.ok) return;
            const pedidos = await response.json();
            renderPedidos(pedidos);
        } catch (error) { 
            console.error("Error cargando cocina:", error);
        }
    }

    function renderPedidos(pedidos) {
        const container = document.getElementById('pedidos-container');
        
        // 1. LIMPIEZA TOTAL: Esto evita que se amontonen las tarjetas viejas
        container.innerHTML = '';

        if (pedidos.length === 0) {
            container.innerHTML = '<div class="loading">✅ No hay pedidos pendientes</div>';
            return;
        }

        // 2. AGRUPACIÓN POR ID ÚNICO: Evita duplicados visuales por cliente
        const ordenes = pedidos.reduce((acc, item) => {
            if (!acc[item.id]) {
                acc[item.id] = { 
                    cliente: item.cliente, 
                    items: [], 
                    estado: item.estado, 
                    id: item.id 
                };
            }
            acc[item.id].items.push(item);
            return acc;
        }, {});

        // 3. RENDERIZADO LIMPIO
        for (const id in ordenes) {
            const orden = ordenes[id];
            const card = document.createElement('div');
            card.className = 'card';
            
            const estadoClass = orden.estado.replace(/\s+/g, ''); // Quita espacios para la clase CSS
            
            card.innerHTML = `
                <div class="card-header ${estadoClass}">
                    <span><strong>${orden.cliente.toUpperCase()}</strong></span>
                    <span>${orden.estado}</span>
                </div>
                <div class="card-body">
                    ${orden.items.map(i => `
                        <div class="item-row">
                            <span>${i.cantidad}x ${i.producto}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="card-footer">
                    ${orden.estado === 'Pendiente' ? 
                        `<button class="btn btn-start" onclick="actualizarPedido(${orden.id}, 'En Proceso')">EMPEZAR COCINA</button>` : 
                        `<button class="btn btn-done" onclick="actualizarPedido(${orden.id}, 'Terminado')">MARCAR COMO LISTO</button>`
                    }
                </div>
            `;
            container.appendChild(card);
        }
    }

    async function actualizarPedido(id, nuevoEstado) {
        try {
            // Se usa PUT para coincidir con la ruta de Flaskk.py
            const response = await fetchWithToken(`/api/cocina/actualizar/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ estado: nuevoEstado })
            });

            if (response && response.ok) {
                // Actualiza la vista inmediatamente después del cambio
                fetchPedidos(); 
            } else {
                alert('Error al actualizar el pedido');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error de conexión');
        }
    }

    // Inicio y ciclo de actualización cada 5 segundos
    fetchPedidos();
    setInterval(fetchPedidos, 5000);
</script>
